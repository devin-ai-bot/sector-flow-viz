name: Fetch Sector Data

on:
  schedule:
    - cron: '0 21 * * 1-5'  # Weekdays at 9 PM UTC (after US market close)
  workflow_dispatch:  # Manual trigger

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install yfinance pandas
          
      - name: Fetch sector data
        run: python scripts/fetch_sector_data.py
        
      - name: Commit data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/sectors.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Update sector data"
          git push
